title: Kenny Chau's Page
description: personal site

markdown: kramdown
kramdown:
  input: GFM

# projects aren't prose - skip auto-excerpt generation (avoids a build warning)
excerpt_separator: ""

# blog posts live at /blog/<slug>/
permalink: /blog/:title/

# static "random" pages live at /random/<slug>/
collections:
  random:
    output: true
    permalink: /random/:path/

# no theme - keep it minimal (overrides GitHub Pages' default Primer theme)
theme:

# keep tooling files out of the published site
# (must also re-list the local-gem dirs, since this replaces Jekyll's defaults)
exclude:
  - run.sh
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .bundle
  - AGENTS.md
  - CLAUDE.md
